<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</head>
<body>

    <div class="container">
        <div class="pichincha-header">
            <img src="bancopichinchalogo.png" id="gifPichincha" alt="Logo">
            <h1>Simulador de Crédito</h1>
        </div>

        <h2>Datos financieros</h2>
        <label for="txtIngresos">Ingresos:</label>
        <input type="text" id="txtIngresos" placeholder="Ej: 1200">
        <small class="error-msg" id="errIngresos"></small>

        <label for="txtArriendo">Arriendo:</label>
        <input type="text" id="txtArriendo" placeholder="Ej: 200">
        <small class="error-msg" id="errArriendo"></small>

        <label for="txtAlimentacion">Alimentación:</label>
        <input type="text" id="txtAlimentacion" placeholder="Ej: 150">
        <small class="error-msg" id="errAlimentacion"></small>

        <label for="txtVarios">Varios:</label>
        <input type="text" id="txtVarios" placeholder="Ej: 50">
        <small class="error-msg" id="errVarios"></small>

        <p>Total Gastos (Egresos): <span id="spnTotalEgresos">0.00</span></p>
        <p>Disponible: <span id="spnDisponible">0.00</span></p>
        <p>Capacidad de pago mensual: <span id="spnCapacidadPago">0.00</span></p>

        <h2>Solicitud de crédito</h2>
        <label for="txtMonto">Monto:</label>
        <input type="text" id="txtMonto" placeholder="Min: $500">
        <small class="error-msg" id="errMonto"></small>

        <label for="txtPlazo">Plazo en años:</label>
        <input type="text" id="txtPlazo" placeholder="1 - 25 años">
        <small class="error-msg" id="errPlazo"></small>

        <label for="txtTasaInteres">Tasa de interés (%):</label>
        <input type="text" id="txtTasaInteres" placeholder="Ej: 12">
        <small class="error-msg" id="errTasaInteres"></small>

        <p>Interés a pagar: <span id="spnInteresPagar">0.00</span></p>
        <p>Total préstamo: <span id="spnTotalPrestamo">0.00</span></p>
        <p class="cuota-final">Cuota mensual: <span id="spnCuotaMensual">0.00</span></p>
        <p>Estado de crédito: <span id="spnEstadoCredito">ESPERANDO DATOS...</span></p>

        <div class="buttons">
            <button class="btn-primary" onclick="calcular()">Calcular Crédito</button>
            <button class="btn-secondary" id="btnReiniciar" onclick="location.reload()">Reiniciar</button>
        </div>
    </div>

</body>
</html>
